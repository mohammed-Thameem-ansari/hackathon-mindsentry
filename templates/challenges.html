<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WellNova – Challenges</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style> body { background: #0f0f1f; } </style>
    </head>
<body class="text-white p-6">
    <h1 class="text-3xl font-bold">Challenges</h1>
    <div class="mt-4 grid gap-4" id="assigned"></div>

    <div class="mt-6 p-4 bg-white/5 rounded">
        <h2 class="text-xl font-semibold">Assign a Challenge</h2>
        <div class="mt-3 flex gap-2 items-center">
            <input id="userId" class="px-3 py-2 rounded bg-white/10" placeholder="User ID" />
            <input id="score" class="px-3 py-2 rounded bg-white/10" placeholder="Score (0-100)" />
            <button id="assignBtn" class="px-4 py-2 bg-blue-600 rounded">Assign</button>
        </div>
    </div>

    <script>
        async function assignChallenge() {
            const userId = document.getElementById('userId').value || 1;
            const score = document.getElementById('score').value || 50;
            const res = await fetch(`/api/challenges/assign/${userId}?score=${score}`, { method: 'POST' });
            const data = await res.json();
            const root = document.getElementById('assigned');
            const div = document.createElement('div');
            div.className = 'p-4 bg-white/5 rounded';
            div.innerHTML = `<div class="font-semibold">${data.challenge || data.msg}</div>`;
            if (data.participation_id) {
                const btn = document.createElement('button');
                btn.className = 'mt-2 px-3 py-2 bg-green-600 rounded';
                btn.textContent = 'Mark Complete';
                btn.onclick = async () => {
                    const r = await fetch(`/api/challenges/complete/${data.participation_id}`, { method: 'POST' });
                    const j = await r.json();
                    alert(JSON.stringify(j));
                };
                div.appendChild(btn);
            }
            root.appendChild(div);
        }
        document.getElementById('assignBtn').onclick = assignChallenge;
    </script>
</body>
</html>
